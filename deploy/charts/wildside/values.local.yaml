image:
  repository: wildside-backend
  tag: local
  pullPolicy: IfNotPresent

config:
  APP_ENV: "local-k8s"
  SESSION_ALLOW_EPHEMERAL: "0"
  SESSION_COOKIE_SECURE: "0"
  SESSION_KEY_FILE: "/var/run/secrets/wildside-session/session_key"
  SESSION_SAMESITE: "Lax"

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix

allowMissingSecret: true
validateExistingSecret: false

externalSecret:
  enabled: false

serviceAccount:
  create: true

sessionSecret:
  enabled: true
  name: "wildside-session-key"
  keyName: "session_key"
  mountPath: "/var/run/secrets/wildside-session"
