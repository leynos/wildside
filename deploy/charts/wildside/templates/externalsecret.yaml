{{- if .Values.externalSecret.enabled -}}
{{- $storeRef := .Values.externalSecret.secretStoreRef -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "wildside.fullname" . }}
  labels:
    {{- include "wildside.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ $storeRef.name | quote }}
    kind: {{ $storeRef.kind | quote }}
  target:
    name: {{ include "wildside.effectiveSecretName" . }}
  data:
    {{- toYaml .Values.externalSecret.data | nindent 4 }}
{{- end }}
