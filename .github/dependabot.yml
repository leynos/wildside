version: 2
updates:
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "02:00"
      timezone: "Etc/UTC"
    cooldown:
      default-days: 7

  # Enable version updates for Cargo. The workspace root covers the
  # backend, backend/crates/pagination, crates/example-data, and
  # tools/architecture-lint member crates.
  - package-ecosystem: "cargo"
    directory: "/"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "cargo"
    schedule:
      interval: "daily"
      time: "02:00"
      timezone: "Etc/UTC"
    cooldown:
      default-days: 7
      semver-major-days: 14

  # Enable version updates for bun at the repository root (bun.lock)
  - package-ecosystem: "bun"
    directory: "/"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "bun"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:10"
      timezone: "Etc/UTC"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 7
      semver-major-days: 14

  # Enable version updates for npm in the frontend PWA
  - package-ecosystem: "npm"
    directory: "/frontend-pwa"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "npm"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:20"
      timezone: "Etc/UTC"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 7
      semver-major-days: 14

  # Enable version updates for npm in the tokens package
  - package-ecosystem: "npm"
    directory: "/packages/tokens"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "npm"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:30"
      timezone: "Etc/UTC"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 7
      semver-major-days: 14

  # Enable version updates for npm in the types package
  - package-ecosystem: "npm"
    directory: "/packages/types"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "npm"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:40"
      timezone: "Etc/UTC"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 7
      semver-major-days: 14

  # Enable version updates for Helm charts
  - package-ecosystem: "helm"
    directory: "/deploy/charts/wildside"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "helm"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "03:00"
      timezone: "Etc/UTC"
    cooldown:
      default-days: 7
