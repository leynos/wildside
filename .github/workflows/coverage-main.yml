name: Coverage (main)

# CodeScene accepts `cs-coverage upload` only for analysed branches, so
# main-branch coverage is uploaded here on push. Pull requests generate
# coverage and enforce changed-line gates in ci.yml's `coverage` job. This
# workflow also advances the coverage ratchet baseline: caches saved on main
# are readable by every pull-request run, so the baseline written here is the
# one PR ratchet checks compare against.
#
# workflow_dispatch is mandatory: merges performed by the automerge
# workflow's GITHUB_TOKEN do not fire push-event workflows, so automerged
# changes to main only get coverage via a manual dispatch.

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage-upload:
    runs-on: ubicloud-standard-8
    env:
      PG_VERSION: "16.10.0"
      # See ci.yml's coverage job: raise the per-invocation cargo
      # wall-clock cap above the repo's 60-minute nextest global-timeout.
      RUN_RUST_CARGO_WAIT_TIMEOUT: '5400'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4
      - name: Install Rust toolchain
        uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57
      - name: Cache PostgreSQL embedded binaries
        uses: ubicloud/cache@92361f338d82d2c58a98875f1b5c95cd14cd6b2a  # v4
        with:
          path: |
            ~/.theseus/postgresql
            ~/.cache/pg-embedded/binaries
          key: ${{ runner.os }}-pg-embedded-${{ env.PG_VERSION }}
          restore-keys: ${{ runner.os }}-pg-embedded-
      - name: Build pg_worker binary
        run: make prepare-pg-worker
      - name: Warm PostgreSQL embedded binary cache
        env:
          # Increase GitHub API rate limits for postgresql_embedded downloads.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin the embedded PostgreSQL version so postgresql_archive skips
          # release-listing queries; the "=" prefix requests an exact match.
          POSTGRESQL_VERSION: =${{ env.PG_VERSION }}
          POSTGRESQL_RELEASES_URL: https://github.com/theseus-rs/postgresql-binaries
        run: bash scripts/warm-pg-embedded-cache.sh
      - name: Generate Rust coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@074f7d8ba75a6e5d18532b72cbe38fccbda4e9c6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTGRESQL_VERSION: =${{ env.PG_VERSION }}
          POSTGRESQL_RELEASES_URL: https://github.com/theseus-rs/postgresql-binaries
          # Keep backend selection explicit for strict PG_TEST_BACKEND validation.
          PG_TEST_BACKEND: postgresql_embedded
          # Root-path bootstrap requires the worker binary for privilege demotion.
          PG_EMBEDDED_WORKER: ${{ github.workspace }}/target/pg_worker
        with:
          # Force Rust-only coverage: the repo's root pyproject.toml is
          # tooling-only (no [project] table), so auto-detection would classify
          # the repo as mixed and reject lcov. See leynos/shared-actions#373.
          language: rust
          output-path: lcov.info
          format: lcov
          # nextest is required: .config/nextest.toml serializes the
          # embedded-Postgres test binaries via the pg-embed test-group.
          use-cargo-nextest: 'true'
          # Mirror ci.yml's coverage job (all features except pagination's
          # trybuild-tests, which the coverage nextest timeout would kill).
          features: example-data metrics test-support
          with-ratchet: 'true'
      - name: Upload coverage data to CodeScene
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != ''
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          # mode defaults to "upload"; CodeScene infers project 70675 from
          # the git remote, so no project-url is needed here. The PR check
          # supplies it explicitly because `mode: check` requires it.
          format: lcov
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
