name: Scheduled dependency audit

# CI skips `make audit` on Dependabot pull requests so that newly published
# advisories against the existing lockfile cannot block unrelated dependency
# bumps. This scheduled run is the compensating control: it audits the
# default branch weekly so anything that slips through surfaces within days.

'on':
  schedule:
    - cron: '31 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v4
      # v4.1.0
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v4
        with:
          node-version: '22'
          corepack: true
          cache: 'pnpm'
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76  # v2
        with:
          bun-version: '1.2.21'
      - name: Install Rust toolchain
        uses: leynos/shared-actions/.github/actions/setup-rust@e4c6b0e200a057edf927c45c298e7ddf229b3934
      - name: Install cargo-audit
        run: cargo binstall --no-confirm cargo-audit@0.22.1
      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile
      - name: Audit dependencies
        run: make audit
