name: ci
"on":
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  PG_VERSION: "16.10.0"

jobs:
  build:
    runs-on: ubicloud-standard-8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4
        with:
          persist-credentials: false
      # v4.1.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v4
        with:
          node-version: '22'
          corepack: true
          cache: 'pnpm'
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76  # v2
        with:
          bun-version: '1.2.21'

      - name: Compute dependency cache keys
        id: dependency-hashes
        shell: bash
        run: |
          set -euo pipefail

          if command -v sha256sum >/dev/null 2>&1; then
            pnpm_lock_hash=$(sha256sum pnpm-lock.yaml | awk '{print $1}')
          else
            pnpm_lock_hash=$(shasum -a 256 pnpm-lock.yaml | awk '{print $1}')
          fi

          frontend_hash=$(cd frontend-pwa && bun pm hash 2>/dev/null || echo 'no-frontend-lock')
          tokens_hash=$(cd packages/tokens && bun pm hash 2>/dev/null || echo 'no-tokens-lock')

          echo "modules=${pnpm_lock_hash}-${frontend_hash}-${tokens_hash}" >>"$GITHUB_OUTPUT"
          echo "bun=${frontend_hash}-${tokens_hash}" >>"$GITHUB_OUTPUT"

      - name: Cache workspace node_modules
        uses: ubicloud/cache@92361f338d82d2c58a98875f1b5c95cd14cd6b2a  # v4
        with:
          path: |
            node_modules
            node_modules/.pnpm-install-*
            frontend-pwa/node_modules
            packages/tokens/node_modules
          key: ${{ runner.os }}-modules-${{ steps.dependency-hashes.outputs.modules }}
          restore-keys: ${{ runner.os }}-modules-

      - name: Cache Bun downloads
        uses: ubicloud/cache@92361f338d82d2c58a98875f1b5c95cd14cd6b2a  # v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun/install/global
          key: ${{ runner.os }}-bun-${{ steps.dependency-hashes.outputs.bun }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install Rust toolchain
        uses: leynos/shared-actions/.github/actions/setup-rust@927edd45ae77be4251a8a18ca9eb5613a2e32cbd

      - name: Install uv
        id: setup-uv
        # v6.4.3
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Check lockfile consistency
        run: make lockfile
      - name: Check override policy
        run: node ./scripts/check-overrides-policy.mjs
      - name: Install dependencies (frozen)
        run: make deps

      - name: Install Mermaid CLI
        run: |
          set -euxo pipefail
          bun install --global @mermaid-js/mermaid-cli@11.9.0
          # bun x @puppeteer/browsers browsers install chrome-headless-shell
          mmdc --version

      - name: Debug Bun and Mermaid
        run: |
          set -euxo pipefail
          which mmdc
          mmdc --version
          bun --version

      # Dependency audits report advisories against the whole lockfile, so a
      # newly published advisory would fail every Dependabot PR regardless of
      # content and deadlock auto-merge. The scheduled audit workflow covers
      # Dependabot merges instead.
      - name: Install cargo-audit
        if: github.actor != 'dependabot[bot]'
        run: cargo binstall --no-confirm cargo-audit@0.22.1

      - name: Audit
        if: github.actor != 'dependabot[bot]'
        run: make audit

      - name: Install Rust for Merman
        run: rustup toolchain install 1.95.0 --profile minimal --no-self-update

      - name: Install Merman CLI
        run: cargo +1.95.0 install merman-cli --version "=0.7.0" --locked

      - name: Install Nixie
        run: uv tool install --python 3.14 "nixie-cli==1.1.0"

      - name: Enforce en-GB-oxendict spelling
        run: make spelling

      - name: Nixie
        run: make nixie

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25  # v24.0.0
        with:
          globs: |
            **/*.md
            !**/node_modules/**

      - name: Setup Helm
        # v4.3.1
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4
        with:
          version: v3.15.0

      - name: Install yamllint
        run: uv tool install yamllint==1.35.1

      - name: Install action-validator
        run: bun install -g action-validator

      - name: Helm lint
        run: helm lint --strict ./deploy/charts/wildside

      - name: YAML lint
        run: make yamllint

      - name: Workflow contract tests
        run: make test-workflow-contracts

      - name: Type check
        run: make typecheck

      - name: Local preview script tests
        run: make test-scripts

      # Backend
      - name: Cache cargo
        uses: ubicloud/cache@92361f338d82d2c58a98875f1b5c95cd14cd6b2a  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Cache PostgreSQL embedded binaries
        uses: ubicloud/cache@92361f338d82d2c58a98875f1b5c95cd14cd6b2a  # v4
        with:
          path: |
            ~/.theseus/postgresql
            ~/.cache/pg-embedded/binaries
          key: ${{ runner.os }}-pg-embedded-${{ env.PG_VERSION }}
          restore-keys: ${{ runner.os }}-pg-embedded-
      - name: Rust build
        run: cargo check --locked --manifest-path backend/Cargo.toml --all-targets --all-features
      - name: Rust fmt check
        run: cargo fmt --manifest-path backend/Cargo.toml --all -- --check
      - name: Rust clippy
        run: make lint-clippy

      - name: Install whitaker
        run: |
          cargo install whitaker-installer --version 0.2.0
          whitaker-installer --experimental
      - name: Whitaker lint
        run: make lint-whitaker

      - name: Architecture lint
        run: make lint-architecture

      - name: Install nextest
        uses: taiki-e/install-action@db22c42b5af88356329b9a8056bb2c2f026d5a10
        with:
          tool: nextest@0.9.114

      - name: Build pg_worker binary
        run: |
          make prepare-pg-worker

      - name: Warm PostgreSQL embedded binary cache
        env:
          # Increase GitHub API rate limits for postgresql_embedded downloads.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin the embedded PostgreSQL version so postgresql_archive skips release-listing queries.
          # Use the semver "exact" prefix so no wildcard resolution is attempted.
          POSTGRESQL_VERSION: =${{ env.PG_VERSION }}
          POSTGRESQL_RELEASES_URL: https://github.com/theseus-rs/postgresql-binaries
        run: bash scripts/warm-pg-embedded-cache.sh

      - name: Rust tests
        env:
          # Increase GitHub API rate limits for postgresql_embedded downloads.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin the embedded PostgreSQL version so postgresql_archive skips release-listing queries.
          # Use the semver "exact" prefix so no wildcard resolution is attempted.
          POSTGRESQL_VERSION: =${{ env.PG_VERSION }}
          # Keep backend selection explicit for strict PG_TEST_BACKEND validation.
          PG_TEST_BACKEND: postgresql_embedded
          # Root-path bootstrap requires the worker binary for privilege demotion.
          PG_EMBEDDED_WORKER: ${{ github.workspace }}/target/pg_worker
        run: |
          # Clean stale pg-embed directories that may conflict with new runs.
          find target/ -maxdepth 1 -type d -name 'pg-embed-*' -exec rm -rf {} + 2>/dev/null || true
          RUSTFLAGS="-D warnings" cargo nextest run --locked \
            --manifest-path backend/Cargo.toml \
            --all-targets --all-features

      - name: Compile-fail tests (pagination trait bounds)
        run: cargo test --locked --features trybuild-tests -p pagination cursor_trait_bound_compile_fail_tests

      # OpenAPI dump (at runtime or via a small bin)
      - name: Generate OpenAPI specification
        run: make openapi

      - name: Lint AsyncAPI specification
        run: make lint-asyncapi

      - name: Lint OpenAPI specification
        run: make lint-openapi

      # Frontend
      - name: Build tokens
        working-directory: packages/tokens
        run: |
          bun install
          bun run build
      - name: Build PWA
        working-directory: frontend-pwa
        run: |
          bun install
          bun run gen:api
          bun run build

  # Rust coverage for CodeScene. The changed-line gate runs immediately after
  # generation when CS_ACCESS_TOKEN is available; the explicit token guard
  # lets forked pull requests skip the secret-dependent step safely.
  # coverage-main.yml uploads main-branch coverage and advances the ratchet
  # baseline that pull-request runs compare against. This job skips Dependabot
  # so dependency automerge stays off the expensive coverage path.
  coverage:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubicloud-standard-8
    env:
      PG_VERSION: "16.10.0"
      # The 927edd4 shared-actions pin caps a single cargo invocation's
      # wall-clock (RUN_RUST_CARGO_WAIT_TIMEOUT, default 600s). The
      # instrumented workspace build plus the serialized embedded-Postgres
      # suite needs far longer — the repo's nextest global-timeout alone is
      # 60 minutes — so raise the cap well above it.
      RUN_RUST_CARGO_WAIT_TIMEOUT: '5400'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4
        with:
          persist-credentials: false
          # `cs-coverage check` diffs against the pull-request merge base, so
          # fetch the full history used by the active changed-line gate.
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: leynos/shared-actions/.github/actions/setup-rust@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
      - name: Cache PostgreSQL embedded binaries
        uses: ubicloud/cache@92361f338d82d2c58a98875f1b5c95cd14cd6b2a  # v4
        with:
          path: |
            ~/.theseus/postgresql
            ~/.cache/pg-embedded/binaries
          key: ${{ runner.os }}-pg-embedded-${{ env.PG_VERSION }}
          restore-keys: ${{ runner.os }}-pg-embedded-
      - name: Build pg_worker binary
        run: make prepare-pg-worker
      - name: Warm PostgreSQL embedded binary cache
        env:
          # Increase GitHub API rate limits for postgresql_embedded downloads.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin the embedded PostgreSQL version so postgresql_archive skips
          # release-listing queries; the "=" prefix requests an exact match.
          POSTGRESQL_VERSION: =${{ env.PG_VERSION }}
          POSTGRESQL_RELEASES_URL: https://github.com/theseus-rs/postgresql-binaries
        run: bash scripts/warm-pg-embedded-cache.sh
      - name: Generate Rust coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTGRESQL_VERSION: =${{ env.PG_VERSION }}
          POSTGRESQL_RELEASES_URL: https://github.com/theseus-rs/postgresql-binaries
          # Keep backend selection explicit for strict PG_TEST_BACKEND validation.
          PG_TEST_BACKEND: postgresql_embedded
          # Root-path bootstrap requires the worker binary for privilege demotion.
          PG_EMBEDDED_WORKER: ${{ github.workspace }}/target/pg_worker
        with:
          output-path: lcov.info
          format: lcov
          # nextest is required: .config/nextest.toml serializes the
          # embedded-Postgres test binaries via the pg-embed test-group;
          # plain `cargo test` would run them in parallel and race on the
          # shared cluster directory.
          use-cargo-nextest: 'true'
          # Mirror ci.yml's --all-features except pagination's
          # trybuild-tests: trybuild scratch compiles under coverage
          # instrumentation exceed the repo's 60s nextest slow-timeout and
          # would be killed. The compile-fail tests add no line coverage.
          features: example-data metrics test-support
          with-ratchet: 'true'
      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: github.event_name == 'pull_request' && env.CS_ACCESS_TOKEN != ''
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/70675
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
