name: Mutation testing

# Thin caller of the shared mutation-testing reusable workflow; caller
# guide: leynos/shared-actions docs/mutation-cargo-workflow.md.
"on":
  schedule:
    - cron: "50 9 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: mutation-testing-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mutation:
    permissions:
      contents: read
      id-token: write  # OIDC workflow-source resolution
    uses: leynos/shared-actions/.github/workflows/mutation-cargo.yml@859416a90eb3987b46a57682c5d6b8964ad3f0a6
    with:
      # Rust source lives under the workspace members (backend, its
      # nested crates, crates/, and tools/); the vendored
      # third_party/shellexpand patch crate stays out of scope.
      paths: "backend/,crates/,tools/"
      # Feature-gated test-support modules compile into the library
      # under --all-features; mutating them only produces noise.
      exclude-globs: "backend/src/test_support.rs,backend/src/test_support/**,backend/src/outbound/cache/test_helpers.rs,backend/src/outbound/queue/test_helpers.rs"
      # CI tests run with --all-features; --test-workspace=true makes
      # cargo-mutants run the whole workspace's tests against each
      # mutant, matching the workspace-wide `make test-rust` baseline
      # (crates such as pagination are exercised by backend's tests).
      extra-args: "--all-features --test-workspace=true"
      # Pin the embedded PostgreSQL version so postgresql_archive skips
      # its unauthenticated release-listing query, which is rate-limited
      # from shared runner IPs (mirrors the ci job's Rust tests env;
      # keep the version aligned with ci.yml's PG_VERSION). The "="
      # prefix requests an exact semver match. PG_EMBEDDED_WORKER and
      # PG_TEST_BACKEND are not needed here: the worker only matters for
      # root-path bootstrap and GitHub-hosted runners are non-root.
      setup-commands: |
        echo "POSTGRESQL_VERSION==16.10.0" >> "$GITHUB_ENV"
        echo "POSTGRESQL_RELEASES_URL=https://github.com/theseus-rs/postgresql-binaries" >> "$GITHUB_ENV"
