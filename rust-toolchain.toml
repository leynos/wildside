# Pinned to a specific dated nightly rather than the floating `nightly`
# channel so CI is shielded from upstream rustc regressions (e.g. the
# 1.99.0-nightly 2026-07-13 macro-expansion ICE). Bump this date deliberately
# after verifying the workspace builds green on the new nightly.
[toolchain]
channel = "nightly-2026-06-29"
components = ["rustfmt", "clippy"]
profile = "minimal"
